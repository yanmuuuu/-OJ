<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 · Yanmuuuu Judge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-start">
            <a class="navbar-brand" href="/all_questions">Yanmuuuu Judge</a>
            <div class="navbar-nav-links">
                <a class="navbar-link" href="/all_questions">题库</a>
                <a class="navbar-link" href="/about">关于</a>
            </div>
        </div>
        <div class="navbar-auth" id="navAuth"></div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">注册</h1>
            <p class="auth-subtitle">创建账号，开始你的算法练习之旅</p>
            <form class="auth-form" id="registerForm" data-mode="register">
                <div class="auth-field">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" autocomplete="username" placeholder="3–16 位用户名" required>
                </div>
                <div class="auth-field">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" autocomplete="new-password" placeholder="至少 8 位，含两种字符类型" required>
                </div>
                <div class="auth-field">
                    <label for="confirm_password">确认密码</label>
                    <input type="password" id="confirm_password" name="confirm_password" autocomplete="new-password" placeholder="再次输入密码" required>
                </div>
                <p class="auth-error hidden" id="authError"></p>
                <button type="submit" class="auth-submit" id="authSubmit">注册</button>
            </form>
            <p class="auth-switch">已有账号？<a href="/login">去登录</a></p>
        </div>
    </main>

    <script src="/js/nav_auth.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
