<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 · OJ</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/all_questions">Online Judge</a>
        <div class="navbar-auth" id="navAuth"></div>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <h1 class="auth-title">登录</h1>
            <p class="auth-subtitle">登录后即可同步你的做题记录（判题暂不强制登录）</p>
            <form class="auth-form" id="loginForm" data-mode="login">
                <div class="auth-field">
                    <label for="username">用户名</label>
                    <input type="text" id="username" name="username" autocomplete="username" placeholder="3–16 位用户名" required>
                </div>
                <div class="auth-field">
                    <label for="password">密码</label>
                    <input type="password" id="password" name="password" autocomplete="current-password" placeholder="至少 8 位，含两种字符类型" required>
                </div>
                <p class="auth-error hidden" id="authError"></p>
                <button type="submit" class="auth-submit" id="authSubmit">登录</button>
            </form>
            <p class="auth-switch">还没有账号？<a href="/register">去注册</a></p>
        </div>
    </main>

    <script src="/js/nav_auth.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
