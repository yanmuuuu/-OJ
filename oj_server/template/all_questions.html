<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>题目列表</title>
    <style>
        body { background: #1a1a2e; color: #eee; font-family: sans-serif; padding: 20px; }
        a { color: #a78bfa; text-decoration: none; }
        .card { background: #16213e; padding: 15px; margin: 10px 0; border-radius: 8px; }
        .search { margin-bottom: 20px; }
        .search input { padding: 8px; width: 200px; }
    </style>
</head>
<body>
    <h2>题目列表</h2>
    <div class="search">
        <input type="text" id="searchInput" placeholder="搜索题目...">
    </div>
    <div id="list">
        {{#QUESTIONS}}
        <div class="card question-card" data-title="{{TITLE}}" data-number="{{NUMBER}}">
            <a href="/question/{{NUMBER}}">{{NUMBER}}. {{TITLE}}</a>
            <span style="margin-left:10px;color:#aaa;">{{STAR}} | {{CPU_LIMIT}}s | {{MEM_LIMIT}}MB</span>
        </div>
        {{/QUESTIONS}}
    </div>
    <p id="emptyMsg" style="display:none;">没有匹配的题目</p>
    <script>
        document.getElementById('searchInput').addEventListener('input', function(e) {
            var val = e.target.value.toLowerCase();
            var cards = document.querySelectorAll('.question-card');
            var visible = 0;
            cards.forEach(function(c) {
                var hit = (c.dataset.title || '').toLowerCase().includes(val) || 
                          (c.dataset.number || '').includes(val);
                c.style.display = hit ? '' : 'none';
                if (hit) visible++;
            });
            document.getElementById('emptyMsg').style.display = visible ? 'none' : '';
        });
    </script>
</body>
</html>
