<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目列表 · OJ</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <a class="navbar-brand" href="/all_questions">Online Judge</a>
        <span class="navbar-link">题目列表</span>
    </nav>

    <main class="page-list">
        <header class="page-header">
            <h1>算法题库</h1>
            <p>选择一道题目，进入代码工作区开始解题</p>
        </header>

        <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索题号或标题..." autocomplete="off">
        </div>

        <div class="stats-bar">
            <span>共 <strong id="totalCount">0</strong> 道题目</span>
        </div>

        <div class="question-grid" id="questionGrid">
            {{#QUESTIONS}}
            <article class="question-card" data-title="{{TITLE}}" data-number="{{NUMBER}}">
                <a href="/question/{{NUMBER}}">
                    <div class="card-number">PROBLEM {{NUMBER}}</div>
                    <h2 class="card-title">{{TITLE}}</h2>
                    <div class="card-meta">
                        <div class="card-limits">
                            <span>{{CPU_LIMIT}}s</span>
                            <span>{{MEM_LIMIT}}MB</span>
                        </div>
                        <span class="difficulty {{STAR}}">{{STAR}}</span>
                        <span class="card-arrow">进入 →</span>
                    </div>
                </a>
            </article>
            {{/QUESTIONS}}
            <div class="empty-state hidden" id="emptyState">没有匹配的题目</div>
        </div>
    </main>

    <script src="/js/all_questions.js"></script>
</body>
</html>
