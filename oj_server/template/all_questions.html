<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>题目列表 · Yanmuuuu Judge</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-start">
            <a class="navbar-brand" href="/all_questions">Yanmuuuu Judge</a>
            <div class="navbar-nav-links">
                <a class="navbar-link navbar-link-active" href="/all_questions">题库</a>
                <a class="navbar-link" href="/my_progress">我的做题</a>
                <a class="navbar-link" href="/about">关于</a>
            </div>
        </div>
        <div class="navbar-auth" id="navAuth"></div>
    </nav>

    <main class="page-list">
        <header class="page-header">
            <h1>算法题库</h1>
            <p>选择一道题目，进入代码工作区开始解题</p>
        </header>

        <div class="search-wrap">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M20 20l-4-4"/></svg>
            <input type="text" class="search-input" id="searchInput" placeholder="搜索题号、标题或出题人..." autocomplete="off">
        </div>

        <div class="list-filters">
            <select class="filter-select" id="filterStatus">
                <option value="all">全部状态</option>
                <option value="solved">已解答</option>
                <option value="attempted">尝试过</option>
                <option value="none">未开始</option>
            </select>
            <select class="filter-select" id="filterStar">
                <option value="all">全部难度</option>
                <option value="简单">简单</option>
                <option value="中等">中等</option>
                <option value="困难">困难</option>
            </select>
        </div>

        <div class="stats-bar">
            <span>共 <strong id="totalCount">0</strong> 道题目</span>
        </div>

        <div class="question-grid" id="questionGrid">
            {{#QUESTIONS}}
            <article class="question-card" data-title="{{TITLE}}" data-number="{{NUMBER}}" data-author="{{AUTHOR_NAME}}" data-star="{{STAR}}">
                <a href="/question/{{NUMBER}}">
                    <div class="card-number">PROBLEM {{NUMBER}}</div>
                    <h2 class="card-title">{{TITLE}}</h2>
                    <div class="card-meta">
                        <div class="card-meta-left">
                            <span class="card-author">出题 · {{AUTHOR_NAME}}</span>
                            <div class="card-limits">
                                <span>{{CPU_LIMIT}}s</span>
                                <span>{{MEM_LIMIT}} KB</span>
                            </div>
                        </div>
                        <div class="card-meta-right">
                            <span class="card-status-wrap"></span>
                            <span class="difficulty {{STAR}}">{{STAR}}</span>
                            <span class="card-arrow">进入 →</span>
                        </div>
                    </div>
                </a>
            </article>
            {{/QUESTIONS}}
            <div class="empty-state hidden" id="emptyState">没有匹配的题目</div>
        </div>
    </main>

    <script src="/js/nav_auth.js"></script>
    <script src="/js/all_questions.js"></script>
</body>
</html>
