<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{NUMBER}}. {{TITLE}} · OJ</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="spotlight" id="spotlight" aria-hidden="true"></div>
    <nav class="navbar">
        <div class="navbar-start">
            <a class="navbar-brand" href="/all_questions">Online Judge</a>
            <div class="navbar-nav-links">
                <a class="navbar-link" href="/all_questions">题库</a>
                <a class="navbar-link" href="/about">关于</a>
            </div>
        </div>
        <div class="navbar-auth" id="navAuth"></div>
    </nav>

    <div class="workspace" id="workspace">
        <aside class="panel-left" id="panelLeft">
            <div class="panel-left-inner">
                <h1 class="problem-title">{{NUMBER}}. {{TITLE}}</h1>
                <div class="problem-meta">
                    <span class="difficulty {{STAR}}">{{STAR}}</span>
                    <span class="meta-tag meta-author">出题 · {{AUTHOR_NAME}}</span>
                    <span class="meta-tag">TIME {{CPU_LIMIT}}s</span>
                    <span class="meta-tag">MEM {{MEM_LIMIT}}MB</span>
                </div>
                <div class="problem-divider"></div>
                <div class="problem-desc" id="problemDesc">{{DESC}}</div>
            </div>
        </aside>

        <div class="panel-resizer" id="panelResizer"></div>

        <section class="panel-right">
            <div class="editor-header">
                <div class="editor-tabs">
                    <span class="editor-tab active">solution.cpp</span>
                </div>
                <div class="editor-actions">
                    <button class="editor-action-btn" id="fontDec" title="缩小字号">−</button>
                    <button class="editor-action-btn" id="fontInc" title="放大字号">+</button>
                </div>
            </div>

            <div class="editor-container" id="editor"></div>

            <div class="editor-footer">
                <button class="btn-submit" id="submitBtn">提交判题</button>
            </div>

            <div class="result-panel hidden" id="resultPanel">
                <div class="result-banner hidden" id="resultBanner">
                    <span class="result-banner-icon" id="resultBannerIcon">·</span>
                    <span class="result-banner-text" id="resultBannerText"></span>
                </div>
                <div class="result-header" id="resultHeader">
                    <span class="result-status" id="resultStatus">等待提交</span>
                    <span class="result-toggle" id="resultToggle">收起</span>
                </div>
                <div class="result-body" id="resultBody"></div>
            </div>
        </section>
    </div>

    <script type="text/plain" id="codeTemplate">{{CODE:none}}</script>
    <div id="questionNumber" class="hidden">{{NUMBER}}</div>

    <script src="/js/effects.js"></script>
    <script src="/js/nav_auth.js"></script>
    <script src="/js/one_question.js"></script>
</body>
</html>
